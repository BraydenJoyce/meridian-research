name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend-lint-test:
    name: Backend — lint, type-check, test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Ruff lint
        run: ruff check app/

      - name: Mypy type-check
        run: mypy app/ --strict

      - name: pytest
        run: pytest tests/ -v --tb=short --cov=app --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend-lint-type:
    name: Frontend — type-check, lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript type-check
        run: npx tsc --noEmit

      - name: ESLint
        run: npx next lint

  docker-build-backend:
    name: Docker build — backend
    runs-on: ubuntu-latest
    needs: [backend-lint-test]
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f devops/Dockerfile.backend -t meridian-backend:${{ github.sha }} .

  docker-build-frontend:
    name: Docker build — frontend
    runs-on: ubuntu-latest
    needs: [frontend-lint-type]
    steps:
      - uses: actions/checkout@v4

      - name: Build frontend image
        run: docker build -f devops/Dockerfile.frontend -t meridian-frontend:${{ github.sha }} .
